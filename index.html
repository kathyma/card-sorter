<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personal Values Card Sort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:wght@400;500;600&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --ink: #1f2430;
    --muted: #6b7280;
    --border: #e2e4e9;
    --accent: #3b6ef5;
    --accent-soft: #e8eefe;
    --danger: #c0392b;
    --viewport-bottom-inset: 0px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Rethink Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-tap-highlight-color: transparent;
  }

  .app-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 16px;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .app-header h1 {
    font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
    font-size: 24px;
    margin: 0;
  }
  .subtitle {
    margin: 4px 0 0;
    font-size: 13px;
    line-height: 1.4;
    color: var(--muted);
  }
  .actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  button {
    font: inherit;
    font-size: 14px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
  }
  button:hover { background: var(--accent-soft); border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { filter: brightness(1.08); }
  button.danger:hover { background: #fdecea; border-color: var(--danger); color: var(--danger); }
  button.confirming { background: #fdecea; border-color: var(--danger); color: var(--danger); font-weight: 600; }

  .hint {
    padding: 8px 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    padding: 0 16px 90px;
    align-items: start;
  }
  .bucket {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    min-height: 120px;
  }
  .bucket-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    position: sticky;
    top: 0;
    background: inherit;
    border-radius: 12px 12px 0 0;
  }
  .bucket-header .count {
    font-weight: 400;
    font-size: 13px;
    color: var(--muted);
  }
  .bucket-cards {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .bucket.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .bucket.drop-target-hint { border-style: dashed; border-color: var(--accent); }
  .empty-note {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 12px 4px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.35;
    cursor: grab;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    user-select: none;
  }
  .card:active { cursor: grabbing; }
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .card.dragging { opacity: 0.5; }
  .card-title { font-weight: 500; }
  .card-subtitle { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .move-bar[hidden] { display: none; }
  .move-bar {
    position: fixed;
    left: 0;
    right: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 12px rgba(15, 23, 42, 0.08);
    bottom: var(--viewport-bottom-inset);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
    gap: 8px;
    z-index: 20;
  }
  .move-bar .label {
    font-size: 13px;
    color: var(--muted);
    flex-basis: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .move-bar button {
    align-items: center;
    display: flex;
    flex: 1;
    justify-content: center;
    line-height: 1.2;
    min-height: 44px;
    min-width: 70px;
    text-align: center;
  }

  /* Medium: two columns — Unsorted on the left, buckets 1–3 stacked on the
     right, each exactly one third of the available height */
  @media (min-width: 621px) and (max-width: 980px) {
    .board {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      align-items: stretch;
      height: calc(100vh - 106px);
      padding-bottom: 12px;
    }
    .bucket[data-bucket="unsorted"] {
      grid-column: 1;
      grid-row: 1 / span 3;
    }
    .bucket { min-height: 0; }
  }
  /* Phone: single column */
  @media (max-width: 620px) {
    .board {
      grid-template-columns: 1fr;
      padding-bottom: calc(112px + env(safe-area-inset-bottom, 0px) + var(--viewport-bottom-inset));
    }
    .app-header h1 { font-size: 18px; }
  }
  /* Medium + desktop: the viewport stays fixed and columns scroll internally. */
  @media (min-width: 621px) {
    html,
    body {
      height: 100%;
      overflow: hidden;
    }
    body {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }
    .print-page {
      min-height: 0;
      overflow: hidden;
    }
    .print-page tbody,
    .print-page tr,
    .print-page td {
      height: 100%;
    }
    .board {
      height: 100%;
      padding-bottom: 12px;
      align-items: stretch;
    }
    .bucket {
      min-height: 0;
      height: 100%;
    }
    .bucket-cards {
      min-height: 0;
      overflow-y: auto;
    }
  }
  @media (min-width: 981px) {
    .board { grid-template-rows: minmax(0, 1fr); }
    .bucket { max-height: none; }
  }

  /* On screen the print table renders as plain blocks, header hidden */
  .print-page, .print-page tbody, .print-page tr, .print-page td { display: block; }
  .print-page { width: 100%; border-collapse: collapse; }
  .print-page thead { display: none; }

  /* Print: clean bucket listing for PDF export */
  @media print {
    html, body { height: auto; overflow: visible; }
    body { background: #fff; display: block; }
    .app-header, .hint, .move-bar { display: none; }
    .print-page { display: table; }
    .print-page tbody { display: table-row-group; }
    .print-page tr { display: table-row; }
    .print-page td { display: table-cell; }
    .print-page thead { display: table-header-group; }
    .print-page-header {
      font-size: 12px;
      color: #555;
      border-bottom: 1px solid #999;
      padding: 0 0 6px;
    }
    .board {
      display: block;
      /* The medium-layout media query can match the print viewport's width
         and impose a fixed height; without auto the table never fragments
         across pages and the running thead header can't repeat. */
      height: auto;
      padding: 8px 0 0;
    }
    .bucket {
      border: none;
      border-radius: 0;
      min-height: 0;
      max-height: none;
      margin-bottom: 16px;
    }
    .bucket.print-hidden { display: none; }
    .bucket-header {
      position: static;
      border-bottom: 2px solid #333;
      padding: 4px 0;
      break-after: avoid;
    }
    .bucket-cards { padding: 6px 0; gap: 4px; overflow: visible; }
    .card {
      border: none;
      box-shadow: none;
      padding: 2px 0;
      border-radius: 0;
      break-inside: avoid;
    }
    .card.selected { box-shadow: none; }
    .empty-note { text-align: left; padding: 2px 0; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="titles">
    <h1>Personal Values Card Sort</h1>
  </div>
  <div class="actions">
    <button class="primary" id="exportBtn">Export PDF</button>
    <button class="danger" id="resetBtn">Reset</button>
  </div>
</header>

<div class="hint">Drag a card into a bucket, or tap a card and pick a destination. Changes save automatically in this browser.</div>

<!-- The table exists only for printing: browsers repeat a thead at the top
     of every printed page, giving the PDF a running page header. On screen
     it renders as plain blocks and the thead is hidden. -->
<table class="print-page">
  <thead>
    <tr><td class="print-page-header">Personal Values Card Sort Results</td></tr>
  </thead>
  <tbody>
    <tr><td>
      <main class="board" id="board"></main>
    </td></tr>
  </tbody>
</table>

<div class="move-bar" id="moveBar" hidden>
  <span class="label" id="moveLabel"></span>
</div>

<script>
"use strict";

/* ========================================================================
   EDIT YOUR CARDS HERE.
   One { title, subtitle } per card. Titles must be unique — the title
   doubles as the ID that saved sorting is keyed on, so renaming a card
   resets its bucket.
   ======================================================================== */
const CARDS = [
  { title: "ACCEPTANCE", subtitle: "to be accepted as I am" },
  { title: "ACCURACY", subtitle: "to be accurate in my opinions and beliefs" },
  { title: "ACHIEVEMENT", subtitle: "to have important accomplishments" },
  { title: "ADVENTURE", subtitle: "to have new and exciting experiences" },
  { title: "ATTRACTIVENESS", subtitle: "to be physically attractive" },
  { title: "AUTHORITY", subtitle: "to be in charge of and responsible for others" },
  { title: "AUTONOMY", subtitle: "to be self-determined and independent" },
  { title: "BEAUTY", subtitle: "to appreciate beauty around me" },
  { title: "CARING", subtitle: "to take care of others" },
  { title: "CHALLENGE", subtitle: "to take on difficult tasks and problems" },
  { title: "CHANGE", subtitle: "to have a life full of change and variety" },
  { title: "COMFORT", subtitle: "to have a pleasant and comfortable life" },
  { title: "COMMITMENT", subtitle: "to make enduring, meaningful commitments" },
  { title: "COMPASSION", subtitle: "to feel and act on concern for others" },
  { title: "CONTRIBUTION", subtitle: "to make a lasting contribution in the world" },
  { title: "COOPERATION", subtitle: "to work collaboratively with others" },
  { title: "COURTESY", subtitle: "to be considerate and polite toward others" },
  { title: "CREATIVITY", subtitle: "to have new and original ideas" },
  { title: "DEPENDABILITY", subtitle: "to be reliable and trustworthy" },
  { title: "DUTY", subtitle: "to carry out my duties and obligations" },
  { title: "ECOLOGY", subtitle: "to live in harmony with the environment" },
  { title: "EXCITEMENT", subtitle: "to have a life full of thrills and stimulation" },
  { title: "FAITHFULNESS", subtitle: "to be loyal and true in relationships" },
  { title: "FAME", subtitle: "to be known and recognized" },
  { title: "FAMILY", subtitle: "to have a happy, loving family" },
  { title: "FITNESS", subtitle: "to be physically fit and strong" },
  { title: "FLEXIBILITY", subtitle: "to adjust to new circumstances easily" },
  { title: "FORGIVENESS", subtitle: "to be forgiving of others" },
  { title: "FRIENDSHIP", subtitle: "to have close, supportive friends" },
  { title: "FUN", subtitle: "to play and have fun" },
  { title: "GENEROSITY", subtitle: "to give what I have to others" },
  { title: "GENUINENESS", subtitle: "to act in a manner that is true to who I am" },
  { title: "GOD'S WILL", subtitle: "to seek and obey the will of God" },
  { title: "GROWTH", subtitle: "to keep changing and growing" },
  { title: "HEALTH", subtitle: "to be physically well and healthy" },
  { title: "HELPFULNESS", subtitle: "to be helpful to others" },
  { title: "HONESTY", subtitle: "to be honest and truthful" },
  { title: "HOPE", subtitle: "to maintain a positive and optimistic outlook" },
  { title: "HUMILITY", subtitle: "to be modest and unassuming" },
  { title: "HUMOR", subtitle: "to see the humorous side of myself and the world" },
  { title: "INDEPENDENCE", subtitle: "to be free from dependence on others" },
  { title: "INDUSTRY", subtitle: "to work hard and well at my life tasks" },
  { title: "INNER PEACE", subtitle: "to experience personal peace" },
  { title: "INTIMACY", subtitle: "to share my innermost experiences with others" },
  { title: "JUSTICE", subtitle: "to promote fair and equal treatment for all" },
  { title: "KNOWLEDGE", subtitle: "to learn and contribute valuable knowledge" },
  { title: "LEISURE", subtitle: "to take time to relax and enjoy" },
  { title: "LOVED", subtitle: "to be loved by those close to me" },
  { title: "LOVING", subtitle: "to give love to others" },
  { title: "MASTERY", subtitle: "to be competent in my everyday activities" },
  { title: "MINDFULNESS", subtitle: "to live conscious and mindful of the present moment" },
  { title: "MODERATION", subtitle: "to avoid excesses and find a middle ground" },
  { title: "MONOGAMY", subtitle: "to have one close, loving relationship" },
  { title: "NON-CONFORMITY", subtitle: "to question and challenge authority and norms" },
  { title: "NURTURANCE", subtitle: "to take care of and nurture others" },
  { title: "OPENNESS", subtitle: "to be open to new experiences, ideas, and options" },
  { title: "ORDER", subtitle: "to have a life that is well-ordered and organized" },
  { title: "PASSION", subtitle: "to have deep feelings about ideas, activities, or people" },
  { title: "PLEASURE", subtitle: "to feel good" },
  { title: "POPULARITY", subtitle: "to be well-liked by many people" },
  { title: "POWER", subtitle: "to have control over others" },
  { title: "PURPOSE", subtitle: "to have meaning and direction in my life" },
  { title: "RATIONALITY", subtitle: "to be guided by reason and logic" },
  { title: "REALISM", subtitle: "to see and act realistically and practically" },
  { title: "RESPONSIBILITY", subtitle: "to make and carry out responsible decisions" },
  { title: "RISK", subtitle: "to take risks and chances" },
  { title: "ROMANCE", subtitle: "to have intense, exciting love in my life" },
  { title: "SELF-ACCEPTANCE", subtitle: "to accept myself as I am" },
  { title: "SAFETY", subtitle: "to be safe and secure" },
  { title: "SELF-CONTROL", subtitle: "to be disciplined in my own actions" },
  { title: "SELF-ESTEEM", subtitle: "to feel good about myself" },
  { title: "SELF-KNOWLEDGE", subtitle: "to have a deep and honest understanding of myself" },
  { title: "SERVICE", subtitle: "to be of service to others" },
  { title: "SEXUALITY", subtitle: "to have an active and satisfying sex life" },
  { title: "SIMPLICITY", subtitle: "to live life simply, with minimal needs" },
  { title: "SOLITUDE", subtitle: "to have time and space where I can be apart from others" },
  { title: "SPIRITUALITY", subtitle: "to grow and mature spiritually" },
  { title: "STABILITY", subtitle: "to have a life that stays fairly consistent" },
  { title: "TOLERANCE", subtitle: "to accept and respect those who differ from me" },
  { title: "TRADITION", subtitle: "to follow respected patterns of the past" },
  { title: "VIRTUE", subtitle: "to live a morally pure and excellent life" },
  { title: "WEALTH", subtitle: "to have plenty of money" },
  { title: "WORLD PEACE", subtitle: "to work to promote peace in the world" },
];

const CARD_TITLES = CARDS.map((c) => c.title);
const CARD_BY_TITLE = new Map(CARDS.map((c) => [c.title, c]));

/* Bucket labels — edit freely. IDs are what saved state is keyed on. */
const BUCKETS = [
  { id: "unsorted", label: "Unsorted" },
  { id: "b1", label: "Very Important" },
  { id: "b2", label: "Important" },
  { id: "b3", label: "Less Important" },
];

const STORAGE_KEY = "card-sorter-state-v1";

/* state: bucket id -> ordered array of card titles */
let state = loadState();
let selectedCard = null;

function updateViewportInsets() {
  const vv = window.visualViewport;
  const inset = vv ? Math.max(0, window.innerHeight - vv.height - vv.offsetTop) : 0;
  document.documentElement.style.setProperty("--viewport-bottom-inset", Math.ceil(inset) + "px");
}

updateViewportInsets();
window.addEventListener("resize", updateViewportInsets);
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", updateViewportInsets);
  window.visualViewport.addEventListener("scroll", updateViewportInsets);
}

function loadState() {
  const empty = () => {
    const s = {};
    for (const b of BUCKETS) s[b.id] = [];
    s.unsorted = CARD_TITLES.slice();
    return s;
  };
  let saved = null;
  try {
    saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  } catch (e) {
    saved = null;
  }
  if (!saved || typeof saved !== "object") return empty();

  // Reconcile saved state with the current CARDS list: keep placements for
  // cards that still exist, drop removed cards, add new cards to unsorted.
  const s = {};
  const known = new Set(CARD_TITLES);
  const placed = new Set();
  for (const b of BUCKETS) {
    const savedList = Array.isArray(saved[b.id]) ? saved[b.id] : [];
    s[b.id] = savedList.filter((c) => known.has(c) && !placed.has(c));
    s[b.id].forEach((c) => placed.add(c));
  }
  for (const c of CARD_TITLES) {
    if (!placed.has(c)) s.unsorted.push(c);
  }
  return s;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    // Private-browsing modes can block localStorage; sorting still works
    // for the session, it just won't persist.
  }
}

/* index is the insertion position in the target bucket, computed with the
   moved card already excluded; null/undefined appends at the end. */
function moveCard(card, toBucket, index) {
  for (const b of BUCKETS) {
    const i = state[b.id].indexOf(card);
    if (i !== -1) state[b.id].splice(i, 1);
  }
  if (index == null || index >= state[toBucket].length) {
    state[toBucket].push(card);
  } else {
    state[toBucket].splice(index, 0, card);
  }
  saveState();
  render();
}

function bucketOf(card) {
  for (const b of BUCKETS) {
    if (state[b.id].includes(card)) return b.id;
  }
  return null;
}

function selectCard(card) {
  selectedCard = selectedCard === card ? null : card;
  render();
}

function render() {
  const board = document.getElementById("board");
  board.textContent = "";

  for (const b of BUCKETS) {
    const section = document.createElement("section");
    section.className = "bucket";
    section.dataset.bucket = b.id;
    if (b.id === "unsorted" && state.unsorted.length === 0) {
      section.classList.add("print-hidden");
    }
    if (selectedCard && bucketOf(selectedCard) !== b.id) {
      section.classList.add("drop-target-hint");
    }

    const header = document.createElement("div");
    header.className = "bucket-header";
    const name = document.createElement("span");
    name.textContent = b.label;
    const count = document.createElement("span");
    count.className = "count";
    count.textContent = state[b.id].length + (state[b.id].length === 1 ? " card" : " cards");
    header.append(name, count);

    const list = document.createElement("div");
    list.className = "bucket-cards";
    for (const card of state[b.id]) {
      list.appendChild(renderCard(card));
    }
    if (state[b.id].length === 0) {
      const note = document.createElement("div");
      note.className = "empty-note";
      note.textContent = b.id === "unsorted" ? "All cards sorted 🎉" : "Empty";
      list.appendChild(note);
    }

    section.append(header, list);

    // Drag-and-drop target
    section.addEventListener("dragover", (e) => {
      e.preventDefault();
      section.classList.add("drag-over");
    });
    section.addEventListener("dragleave", () => section.classList.remove("drag-over"));
    section.addEventListener("drop", (e) => {
      e.preventDefault();
      section.classList.remove("drag-over");
      const card = e.dataTransfer.getData("text/plain");
      if (!card || bucketOf(card) === null) return;
      // Insert at the drop position: the card lands above the first card
      // whose vertical midpoint is below the pointer. Works for reordering
      // within the same bucket too.
      const others = [...section.querySelectorAll(".bucket-cards .card")]
        .filter((el) => el.dataset.card !== card);
      let index = others.length;
      for (let i = 0; i < others.length; i++) {
        const r = others[i].getBoundingClientRect();
        if (e.clientY < r.top + r.height / 2) { index = i; break; }
      }
      moveCard(card, b.id, index);
    });

    // Tap-to-assign target: tapping a bucket while a card is selected moves it;
    // tapping the bucket it's already in just deselects.
    section.addEventListener("click", (e) => {
      if (!selectedCard) return;
      if (e.target.closest(".card")) return; // card taps handle selection
      const card = selectedCard;
      selectedCard = null;
      if (bucketOf(card) !== b.id) {
        moveCard(card, b.id);
      } else {
        render();
      }
    });

    board.appendChild(section);
  }

  renderMoveBar();
}

function renderCard(card) {
  const el = document.createElement("div");
  el.className = "card";
  el.dataset.card = card;
  const title = document.createElement("div");
  title.className = "card-title";
  title.textContent = card;
  el.appendChild(title);
  const subtitle = CARD_BY_TITLE.get(card)?.subtitle;
  if (subtitle) {
    const sub = document.createElement("div");
    sub.className = "card-subtitle";
    sub.textContent = subtitle;
    el.appendChild(sub);
  }
  el.draggable = true;
  if (card === selectedCard) el.classList.add("selected");

  el.addEventListener("click", () => selectCard(card));
  el.addEventListener("dragstart", (e) => {
    e.dataTransfer.setData("text/plain", card);
    e.dataTransfer.effectAllowed = "move";
    el.classList.add("dragging");
    if (selectedCard) {
      selectedCard = null;
      renderMoveBar();
    }
  });
  el.addEventListener("dragend", () => el.classList.remove("dragging"));
  return el;
}

function renderMoveBar() {
  const bar = document.getElementById("moveBar");
  bar.textContent = "";
  if (!selectedCard) {
    bar.hidden = true;
    return;
  }
  bar.hidden = false;

  const label = document.createElement("span");
  label.className = "label";
  label.textContent = "Move “" + selectedCard + "” to:";
  bar.appendChild(label);

  const from = bucketOf(selectedCard);
  for (const b of BUCKETS) {
    if (b.id === from) continue;
    const btn = document.createElement("button");
    btn.textContent = b.label;
    btn.addEventListener("click", () => {
      const card = selectedCard;
      selectedCard = null;
      moveCard(card, b.id);
    });
    bar.appendChild(btn);
  }
}

document.getElementById("exportBtn").addEventListener("click", () => {
  selectedCard = null;
  render();
  window.print();
});

/* The browser derives the print-to-PDF filename from the document title,
   so swap it to "Personal Values Card Sort" for the duration of the print. */
let titleBeforePrint = document.title;
window.addEventListener("beforeprint", () => {
  titleBeforePrint = document.title;
  document.title = "Personal Values Card Sort";
  document.getElementById("printMeta").textContent = new Date().toLocaleString();
});
window.addEventListener("afterprint", () => {
  document.title = titleBeforePrint;
});

/* In-page two-step reset (native confirm() is blocked in some embedded
   browsers): first click arms the button, second click resets. */
const resetBtn = document.getElementById("resetBtn");
let resetArmTimer = null;
function disarmReset() {
  clearTimeout(resetArmTimer);
  resetBtn.classList.remove("confirming");
  resetBtn.textContent = "Reset";
}
resetBtn.addEventListener("click", () => {
  if (!resetBtn.classList.contains("confirming")) {
    resetBtn.classList.add("confirming");
    resetBtn.textContent = "Really reset?";
    resetArmTimer = setTimeout(disarmReset, 5000);
    return;
  }
  disarmReset();
  localStorage.removeItem(STORAGE_KEY);
  selectedCard = null;
  state = loadState();
  render();
});

render();
</script>
</body>
</html>
